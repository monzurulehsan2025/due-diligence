<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veritas Risk - Due Diligence Portal MVP</title>
  <meta name="description" content="Veritas Risk Due Diligence and Background Screening Portal MVP. Built with React and Vanilla CSS, simulating 5 RESTful API endpoints for case risk advisory.">
  
  <!-- Load React 18, React DOM, and Babel Standalone -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>

  <!-- Inlined styles.css for robust file:// execution -->
  <style>
    /* Import premium typography */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg-main: #090D16;
      --bg-sidebar: #0C111C;
      --bg-card: rgba(17, 24, 39, 0.7);
      --bg-card-hover: rgba(26, 36, 57, 0.8);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(59, 130, 246, 0.3);
      
      --primary: #3B82F6;
      --primary-glow: rgba(59, 130, 246, 0.15);
      --secondary: #6366F1;
      --accent: #8B5CF6;
      
      --text-primary: #F3F4F6;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;
      
      --success: #10B981;
      --success-bg: rgba(16, 185, 129, 0.1);
      --warning: #F59E0B;
      --warning-bg: rgba(245, 158, 11, 0.1);
      --danger: #EF4444;
      --danger-bg: rgba(239, 68, 68, 0.1);
      --info: #06B6D4;
      --info-bg: rgba(6, 182, 212, 0.1);
      
      --sidebar-width: 260px;
      --console-width: 420px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    /* Custom Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Layout Grid */
    .app-container {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr var(--console-width);
      height: 100vh;
      width: 100vw;
      transition: grid-template-columns 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .app-container.console-collapsed {
      grid-template-columns: var(--sidebar-width) 1fr 0px;
    }

    /* Sidebar Styling */
    .sidebar {
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .brand-icon {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
    }

    .brand-icon svg {
      color: white;
      width: 1.25rem;
      height: 1.25rem;
    }

    .brand-name {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #9ca3af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .menu-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex-grow: 1;
    }

    .menu-item button {
      width: 100%;
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 500;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .menu-item button:hover {
      background-color: rgba(255, 255, 255, 0.03);
      color: var(--text-primary);
    }

    .menu-item.active button {
      background: linear-gradient(90deg, rgba(59, 130, 246, 0.15) 0%, rgba(99, 102, 241, 0.05) 100%);
      color: var(--primary);
      border-left: 3px solid var(--primary);
      border-radius: 0 0.5rem 0.5rem 0;
      padding-left: calc(1rem - 3px);
    }

    .sidebar-footer {
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .sidebar-footer .company-name {
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
    }

    /* Main Area */
    .main-content {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .top-bar {
      height: 4.5rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      background-color: rgba(9, 13, 22, 0.5);
      backdrop-filter: blur(10px);
    }

    .view-title h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .badge-dev {
      background-color: var(--primary-glow);
      color: var(--primary);
      border: 1px solid var(--border-hover);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .user-avatar {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--secondary), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
    }

    .view-container {
      flex-grow: 1;
      padding: 2rem;
      overflow-y: auto;
    }

    /* Glassmorphic Card */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      padding: 1.5rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    /* Dashboard Widgets */
    .widgets-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .widget-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .widget-info h3 {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .widget-info .value {
      font-family: 'Outfit', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .widget-icon {
      width: 3rem;
      height: 3rem;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .widget-icon.blue { background-color: rgba(59, 130, 246, 0.1); color: var(--primary); }
    .widget-icon.red { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .widget-icon.green { background-color: rgba(16, 185, 129, 0.1); color: var(--success); }
    .widget-icon.purple { background-color: rgba(139, 92, 246, 0.1); color: var(--accent); }

    /* Dashboard layout sections */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .section-header h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
    }

    /* Buttons */
    .btn {
      background: none;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: #2563EB;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
    }

    .btn-secondary {
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.05);
      border-color: var(--text-secondary);
    }

    .btn-outline-danger {
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
    }

    .btn-outline-danger:hover {
      background-color: rgba(239, 68, 68, 0.05);
    }

    /* List Table styling */
    .cases-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .cases-table th {
      padding: 0.75rem 1rem;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
      border-bottom: 1px solid var(--border-color);
    }

    .cases-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
    }

    .cases-table tr {
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .cases-table tr:hover td {
      background-color: rgba(255, 255, 255, 0.02);
    }

    /* Risk Badges */
    .badge-risk {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-risk.high { background-color: var(--danger-bg); color: var(--danger); }
    .badge-risk.medium { background-color: var(--warning-bg); color: var(--warning); }
    .badge-risk.low { background-color: var(--success-bg); color: var(--success); }

    /* Status Badges */
    .badge-status {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.375rem;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .badge-status.in_progress { background-color: var(--info-bg); color: var(--info); }
    .badge-status.review_required { background-color: var(--warning-bg); color: var(--warning); }
    .badge-status.completed { background-color: var(--success-bg); color: var(--success); }

    .badge-status::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: currentColor;
    }

    /* Case Detail Layout */
    .case-detail-container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
    }

    .detail-main {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .detail-section-title {
      font-size: 0.95rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .info-item .label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .info-item .val {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .watchlist-card {
      margin-top: 1rem;
    }

    .watchlist-item {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .watchlist-item:last-child {
      border-bottom: none;
    }

    .adverse-news-item {
      background-color: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-top: 0.5rem;
    }

    .adverse-news-item .source {
      font-size: 0.75rem;
      color: var(--danger);
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .adverse-news-item .title {
      font-weight: 500;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .adverse-news-item .desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* AI Report View */
    .ai-report-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
      border: 1px dashed var(--border-color);
      border-radius: 0.5rem;
    }

    .ai-report-empty p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
      max-width: 280px;
    }

    .ai-report-container {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .ai-summary-text {
      background-color: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 0.5rem;
      padding: 1rem;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .ai-flags-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .ai-flag-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: rgba(255, 255, 255, 0.02);
      padding: 0.75rem 1rem;
      border-radius: 0.375rem;
      border-left: 3px solid var(--border-color);
    }

    .ai-flag-item.high { border-left-color: var(--danger); }
    .ai-flag-item.medium { border-left-color: var(--warning); }

    .ai-flag-details {
      display: flex;
      flex-direction: column;
    }

    .ai-flag-category {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .ai-flag-desc {
      font-size: 0.85rem;
      color: var(--text-primary);
    }

    /* Modal Form styling */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background-color: #0F1626;
      border: 1px solid var(--border-color);
      width: 100%;
      max-width: 500px;
      border-radius: 0.75rem;
      padding: 2rem;
      position: relative;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-header h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 0.375rem;
      padding: 0.75rem;
      color: var(--text-primary);
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    /* Console Panel (Right Sidebar) */
    .console-panel {
      background-color: var(--bg-sidebar);
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      transition: width 0.3s ease;
    }

    .console-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: rgba(255, 255, 255, 0.01);
    }

    .console-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .console-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse 2s infinite;
    }

    .console-title h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .console-clear {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      text-decoration: underline;
    }

    .console-logs {
      flex-grow: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .console-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
    }

    .console-empty p {
      font-size: 0.85rem;
      max-width: 220px;
    }

    .log-entry {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 1rem;
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .log-method-path {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .log-method {
      padding: 0.15rem 0.4rem;
      border-radius: 0.25rem;
      color: white;
      font-size: 0.7rem;
    }

    .log-method.GET { background-color: var(--success); }
    .log-method.POST { background-color: var(--primary); }
    .log-method.PUT { background-color: var(--warning); }

    .log-time {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .log-payload-title {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      margin-bottom: 0.25rem;
    }

    .log-json {
      background-color: #07090E;
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 0.375rem;
      padding: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #818CF8;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 150px;
      overflow-y: auto;
    }

    /* Keyframes */
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    /* Animations */
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Inlined React app logic for robust file:// execution -->
  <script type="text/babel">

                <div className="animate-fade-in card">
                  <div className="section-header">
                    <h2>Automated System Tests</h2>
                    <button className="btn btn-primary" onClick={runTestSuite} disabled={isTesting}>
                      {isTesting ? 'Running Tests...' : 'Run Test Suite'}
                    </button>
                  </div>
                  <div className="test-results-container" style={{ display: 'flex', flexDirection: 'column', gap: '1rem', marginTop: '1.5rem' }}>
                    {testResults.map((result, idx) => (
                      <div key={idx} className="card" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '1.25rem 1.5rem' }}>
                        <div>
                          <div style={{ fontWeight: '600', fontSize: '0.95rem' }}>{result.name}</div>
                          <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)', marginTop: '0.25rem' }}>{result.description}</div>
                          {result.error && (
                            <div style={{ color: 'var(--danger)', fontSize: '0.8rem', marginTop: '0.5rem', fontFamily: 'monospace' }}>
                              Error: {result.error}
                            </div>
                          )}
                        </div>
                        <div>
                          <span className={`badge-status ${result.status === 'passed' ? 'completed' : result.status === 'failed' ? 'review_required' : result.status === 'running' ? 'in_progress' : 'in_progress'}`} style={{ color: result.status === 'pending' ? 'var(--text-muted)' : 'inherit' }}>
                            {result.status.toUpperCase()}
                          </span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Case Detail View */}
              {currentView === 'case-detail' && (
                <div className="animate-fade-in">
                  {(() => {
                    const currentCase = cases.find(c => c.id === selectedCaseId);
                    const screening = screenings[selectedCaseId] || {};
                    const aiReport = aiReports[selectedCaseId];
                    
                    if (!currentCase) return <p>Case not found</p>;

                    return (
                      <div className="case-detail-container">
                        <div className="detail-main">
                          {/* Case Details card */}
                          <div className="card">
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '1.5rem', alignItems: 'center' }}>
                              <div>
                                <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>Case ID: {currentCase.id}</div>
                                <h2 style={{ fontFamily: 'Outfit', fontSize: '1.5rem', fontWeight: 700, marginTop: '0.25rem' }}>{currentCase.subjectName}</h2>
                              </div>
                              <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center' }}>
                                <span className={`badge-risk ${currentCase.riskLevel.toLowerCase()}`}>{currentCase.riskLevel} Risk</span>
                                <span className={`badge-status ${currentCase.status.toLowerCase().replace(' ', '_')}`}>{currentCase.status}</span>
                              </div>
                            </div>

                            <div className="info-grid">
                              <div className="info-item">
                                <div className="label">Subject Type</div>
                                <div className="val">{currentCase.subjectType}</div>
                              </div>
                              <div className="info-item">
                                <div className="label">Associated Entity</div>
                                <div className="val">{currentCase.companyAssociation}</div>
                              </div>
                              <div className="info-item">
                                <div className="label">Scope Profile</div>
                                <div className="val">{currentCase.investigationScope || 'Enhanced Verification'}</div>
                              </div>
                              <div className="info-item">
                                <div className="label">Created Date</div>
                                <div className="val">{new Date(currentCase.createdAt).toLocaleString()}</div>
                              </div>
                            </div>
                          </div>

                          {/* Watchlist Screening Results */}
                          <div className="card">
                            <h3 className="detail-section-title">Background Screening Records</h3>
                            
                            <div className="info-grid">
                              <div className="watchlist-card">
                                <div style={{ fontWeight: '600', fontSize: '0.9rem', marginBottom: '0.5rem', color: 'var(--text-secondary)' }}>Watchlist Hits</div>
                                <div className="watchlist-item">
                                  <span>Politically Exposed Person (PEP)</span>
                                  <span style={{ 
                                    color: screening.watchlists?.pepStatus?.includes('Match') ? 'var(--danger)' : 'var(--success)', 
                                    fontWeight: '600', 
                                    fontSize: '0.85rem' 
                                  }}>
                                    {screening.watchlists?.pepStatus || 'Checking...'}
                                  </span>
                                </div>
                                <div className="watchlist-item">
                                  <span>Sanctions Lists (OFAC, EU, UN)</span>
                                  <span style={{ 
                                    color: screening.watchlists?.sanctionsList?.includes('Match') ? 'var(--danger)' : 'var(--success)', 
                                    fontWeight: '600', 
                                    fontSize: '0.85rem' 
                                  }}>
                                    {screening.watchlists?.sanctionsList || 'Checking...'}
                                  </span>
                                </div>
                              </div>

                              <div className="watchlist-card">
                                <div style={{ fontWeight: '600', fontSize: '0.9rem', marginBottom: '0.5rem', color: 'var(--text-secondary)' }}>Verification Checks</div>
                                <div className="watchlist-item">
                                  <span>Identity Document Verification</span>
                                  <span style={{ color: 'var(--success)', fontWeight: '600', fontSize: '0.85rem' }}>
                                    {screening.verificationChecks?.identityVerified ? 'Verified' : 'Failed'}
                                  </span>
                                </div>
                                <div className="watchlist-item">
                                  <span>Corporate / Education Credentials</span>
                                  <span style={{ color: screening.verificationChecks?.educationVerified ? 'var(--success)' : 'var(--warning)', fontWeight: '600', fontSize: '0.85rem' }}>
                                    {screening.verificationChecks?.educationVerified ? 'Verified' : 'Unavailable'}
                                  </span>
                                </div>
                              </div>
                            </div>

                            {/* Adverse Media matches */}
                            <div style={{ marginTop: '1.5rem' }}>
                              <div style={{ fontWeight: '600', fontSize: '0.9rem', color: 'var(--text-secondary)', marginBottom: '0.5rem' }}>Adverse Media Matches</div>
                              {screening.watchlists?.adverseMedia && screening.watchlists.adverseMedia.length > 0 ? (
                                screening.watchlists.adverseMedia.map((media, i) => (
                                  <div key={i} className="adverse-news-item">
                                    <div className="source">{media.source} — {media.date} ({media.sentiment})</div>
                                    <div className="title">{media.title}</div>
                                    <div className="desc">Negative sentiment article flagged during automated public record sweep. Review for potential reputation implications.</div>
                                  </div>
                                ))
                              ) : (
                                <div style={{ fontSize: '0.85rem', color: 'var(--text-muted)', fontStyle: 'italic' }}>No adverse media matches flagged in public records.</div>
                              )}
                            </div>
                          </div>
                        </div>

                        {/* AI Assessment & Control Panel */}
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
                          <div className="card">
                            <h3 className="detail-section-title">Case Controls</h3>
                            
                            <div className="form-group">
                              <label>Case Status</label>
                              <select 
                                value={currentCase.status} 
                                onChange={(e) => apiUpdateStatus(currentCase.id, e.target.value)}
                                disabled={activeCallId === `update-status-${currentCase.id}`}
                              >
                                <option value="In Progress">In Progress</option>
                                <option value="Review Required">Review Required</option>
                                <option value="Completed">Completed</option>
                              </select>
                            </div>
                            
                            <div style={{ marginTop: '1.5rem' }}>
                              <button 
                                onClick={() => apiRunAiAnalysis(currentCase.id)} 
                                className="btn btn-primary" 
                                style={{ width: '100%', justifyContent: 'center' }}
                                disabled={activeCallId === `ai-analyze-${currentCase.id}`}
                              >
                                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="2" fill="none" style={{ marginRight: '4px' }}>
                                  <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                                  <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                                  <line x1="12" y1="22.08" x2="12" y2="12" />
                                </svg>
                                {activeCallId === `ai-analyze-${currentCase.id}` ? 'Running Analysis...' : 'Generate AI Risk Profile'}
                              </button>
                            </div>
                          </div>

                          {/* AI Report Card */}
                          <div className="card">
                            <h3 className="detail-section-title">Practical AI Assistant</h3>
                            {aiReport ? (
                              <div className="ai-report-container">
                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', color: 'var(--primary)', fontWeight: '600', fontSize: '0.85rem' }}>
                                  <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="2" fill="none">
                                    <circle cx="12" cy="12" r="10" />
                                    <path d="M12 16v-4" /><path d="M12 8h.01" />
                                  </svg>
                                  Assessment Profile Generated
                                </div>
                                <div className="ai-summary-text">{aiReport.aiSummary}</div>
                                
                                <div className="ai-flags-list">
                                  <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)', fontWeight: '600' }}>FLAGGED RISK CLASSIFICATIONS</div>
                                  {aiReport.flagsDetected && aiReport.flagsDetected.length > 0 ? (
                                    aiReport.flagsDetected.map((flag, idx) => (
                                      <div key={idx} className={`ai-flag-item ${flag.severity.toLowerCase()}`}>
                                        <div className="ai-flag-details">
                                          <span className="ai-flag-category">{flag.category}</span>
                                          <span className="ai-flag-desc">{flag.description}</span>
                                        </div>
                                        <span className={`badge-risk ${flag.severity.toLowerCase()}`} style={{ fontSize: '0.65rem' }}>
                                          {flag.severity}
                                        </span>
                                      </div>
                                    ))
                                  ) : (
                                    <div style={{ fontSize: '0.8rem', color: 'var(--text-muted)' }}>No high severity risk items identified by AI sweep.</div>
                                  )}
                                </div>

                                <div style={{ borderTop: '1px solid var(--border-color)', paddingTop: '1rem', marginTop: '0.5rem' }}>
                                  <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)' }}>AI Recommendation</div>
                                  <div style={{ fontSize: '0.9rem', fontWeight: '600', color: 'var(--accent)', marginTop: '0.25rem' }}>{aiReport.recommendedAction}</div>
                                </div>
                              </div>
                            ) : (
                              <div className="ai-report-empty">
                                <p>Generate an AI risk summary to parse public records and extract red flags.</p>
                                <button onClick={() => apiRunAiAnalysis(currentCase.id)} className="btn btn-secondary">
                                  Analyze Subject
                                </button>
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })()}
                </div>
              )}
            </div>
          </main>

          {/* Live API Console / Inspector (Right Panel) */}
          <section className="console-panel">
            <header className="console-header">
              <div className="console-title">
                <span className="console-indicator" />
                <h2>Live API Console</h2>
              </div>
              <button className="console-clear" onClick={() => setConsoleLogs([])}>Clear</button>
            </header>
            
            <div className="console-logs">
              {consoleLogs.length > 0 ? (
                consoleLogs.map(log => (
                  <div key={log.id} className="log-entry animate-fade-in">
                    <div className="log-meta">
                      <div className="log-method-path">
                        <span className={`log-method ${log.method}`}>{log.method}</span>
                        <span>{log.path}</span>
                      </div>
                      <span className="log-time">{log.timestamp}</span>
                    </div>
                    
                    {log.requestPayload && (
                      <div>
                        <div className="log-payload-title">Request Payload</div>
                        <pre className="log-json"><code>{log.requestPayload}</code></pre>
                      </div>
                    )}
                    
                    <div>
                      <div className="log-payload-title">Response Payload</div>
                      <pre className="log-json"><code>{log.responsePayload}</code></pre>
                    </div>
                  </div>
                ))
              ) : (
                <div className="console-empty">
                  <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" strokeWidth="1.5" fill="none" style={{ color: 'var(--text-muted)', marginBottom: '1rem' }}>
                    <polyline points="16 18 22 12 16 6" />
                    <polyline points="8 6 2 12 8 18" />
                  </svg>
                  <p>Interact with the user interface to view live RESTful API requests and responses.</p>
                </div>
              )}
            </div>
          </section>

          {/* Create Case Modal Form */}
          {isModalOpen && (
            <div className="modal-overlay">
              <div className="modal-content animate-fade-in">
                <div className="modal-header">
                  <h2>Initiate Due Diligence Check</h2>
                  <button className="modal-close" onClick={() => setIsModalOpen(false)}>&times;</button>
                </div>
                
                <form onSubmit={apiCreateCase}>
                  <div className="form-group">
                    <label>Subject / Entity Name</label>
                    <input 
                      type="text" 
                      value={newCaseData.subjectName} 
                      onChange={(e) => setNewCaseData(prev => ({ ...prev, subjectName: e.target.value }))}
                      placeholder="e.g. Alistair Vance / Vortex Energy Corp"
                      required
                    />
                  </div>

                  <div className="form-group">
                    <label>Subject Type</label>
                    <select 
                      value={newCaseData.subjectType} 
                      onChange={(e) => setNewCaseData(prev => ({ ...prev, subjectType: e.target.value }))}
                    >
                      <option value="Individual">Individual</option>
                      <option value="Entity">Corporate Entity</option>
                    </select>
                  </div>

                  <div className="form-group">
                    <label>Company Association</label>
                    <input 
                      type="text" 
                      value={newCaseData.companyAssociation} 
                      onChange={(e) => setNewCaseData(prev => ({ ...prev, companyAssociation: e.target.value }))}
                      placeholder="e.g. Apex Wealth Management"
                    />
                  </div>

                  <div className="form-group">
                    <label>Investigation Scope</label>
                    <select 
                      value={newCaseData.investigationScope} 
                      onChange={(e) => setNewCaseData(prev => ({ ...prev, investigationScope: e.target.value }))}
                    >
                      <option value="Enhanced Profile">Enhanced Risk Profiling</option>
                      <option value="Corporate Integrity">Corporate Integrity Check</option>
                      <option value="Standard KYC">Standard KYC Verification</option>
                    </select>
                  </div>

                  <div className="form-actions">
                    <button type="button" className="btn btn-secondary" onClick={() => setIsModalOpen(false)}>
                      Cancel
                    </button>
                    <button type="submit" className="btn btn-primary" disabled={activeCallId === 'create-case'}>
                      {activeCallId === 'create-case' ? 'Initiating...' : 'Submit Profile'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Mount the App
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
